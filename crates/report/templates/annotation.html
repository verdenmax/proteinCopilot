<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Annotation — ProteinCopilot</title>
<style>
  :root {
    --b-color: #d63031;
    --y-color: #0984e3;
    --unmatched: #e0e0e0;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #2c3e50;
    --text-muted: #7f8c8d;
    --border: #dee2e6;
    --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 20px; }

  /* ── Info Card ────────────────────────────────────────── */
  .info-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px; margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .info-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px 24px; }
  .info-item { display: flex; flex-direction: column; }
  .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); margin-bottom: 2px; }
  .info-value { font-size: 14px; font-weight: 500; }
  .info-value.peptide { font-family: 'Courier New', Courier, monospace; font-size: 16px; letter-spacing: 1px; font-weight: 700; }
  .score-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    color: #fff; font-weight: 700; font-size: 13px;
  }
  .score-badge.good { background: #27ae60; }
  .score-badge.mid  { background: #f39c12; }
  .score-badge.low  { background: #e74c3c; }

  /* ── Coverage Diagram ────────────────────────────────── */
  .coverage-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px; margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow-x: auto;
  }
  .coverage-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .coverage-wrap { display: inline-flex; flex-direction: column; align-items: flex-start; min-width: min-content; }
  .cov-row { display: flex; align-items: center; height: 22px; }
  .cov-cell { width: 38px; text-align: center; font-size: 11px; font-weight: 600; position: relative; }
  .cov-cell.matched-b { color: var(--b-color); }
  .cov-cell.matched-y { color: var(--y-color); }
  .cov-cell.unmatched { color: var(--unmatched); }
  .cov-cell.spacer { width: 10px; }
  .cov-pill {
    display: inline-block; padding: 1px 5px; border-radius: 6px; font-size: 10px; font-weight: 700;
  }
  .cov-pill.b-pill { background: rgba(214,48,49,.12); color: var(--b-color); }
  .cov-pill.y-pill { background: rgba(9,132,227,.12); color: var(--y-color); }
  .seq-row { display: flex; align-items: center; height: 30px; }
  .seq-cell { width: 38px; text-align: center; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: 700; }
  .seq-sep { width: 10px; display: flex; justify-content: center; }
  .seq-sep .cleavage { width: 1px; height: 30px; background: var(--border); }
  .seq-sep .cleavage.both-matched { width: 3px; background: linear-gradient(to right, var(--b-color), var(--y-color)); border-radius: 1px; }
  .seq-sep .cleavage.b-matched { width: 2px; background: var(--b-color); border-radius: 1px; }
  .seq-sep .cleavage.y-matched { width: 2px; background: var(--y-color); border-radius: 1px; }

  /* ── Spectrum Plot ───────────────────────────────────── */
  .spectrum-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .spectrum-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  svg text { font-family: var(--font); }
  .axis text { font-size: 11px; fill: var(--text-muted); }
  .axis line, .axis path { stroke: var(--border); }
  .axis-label { font-size: 12px; fill: var(--text); font-weight: 500; }
  .peak-label { font-size: 12px; font-weight: 700; }
  .peak-line { stroke-width: 2.5; }
  .peak-line.unmatched { stroke: var(--unmatched); stroke-width: 1; }
  .peak-line.b-ion { stroke: var(--b-color); }
  .peak-line.y-ion { stroke: var(--y-color); }
  .peak-hitbox { stroke: transparent; stroke-width: 8; fill: none; cursor: pointer; }

  /* ── Tooltip ─────────────────────────────────────────── */
  #tooltip {
    position: fixed; pointer-events: none; display: none;
    background: rgba(44,62,80,.95); color: #fff; padding: 10px 14px;
    border-radius: 6px; font-size: 12px; line-height: 1.6;
    white-space: nowrap; z-index: 1000;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  #tooltip::after {
    content: ''; position: absolute; top: 100%; left: 16px;
    border: 6px solid transparent; border-top-color: rgba(44,62,80,.95);
  }
  .tip-row { display: flex; justify-content: space-between; gap: 16px; }
  .tip-label { color: #95a5a6; font-size: 11px; }
  .tip-val { font-weight: 600; text-align: right; }
  .tip-sep { border: none; border-top: 1px solid rgba(255,255,255,.15); margin: 4px 0; }
</style>
</head>
<body>

<div id="info-panel" class="info-card"></div>
<div id="coverage-panel" class="coverage-card"></div>
<div class="spectrum-card">
  <h2>Spectrum</h2>
  <div id="spectrum-container"></div>
</div>
<div id="tooltip"></div>

<script>
/*__ANNOTATION_JSON__*/
</script>
<script>
(function () {
  "use strict";
  var D = window.__ANNOTATION_DATA__;
  if (!D) return;

  /* ── helpers ──────────────────────────────────────────── */
  function fmt(n, d) { return Number(n).toFixed(d === undefined ? 2 : d); }
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    if (typeof children === "string") e.textContent = children;
    else if (Array.isArray(children)) children.forEach(function (c) { if (c) e.appendChild(c); });
    return e;
  }
  function svgEl(tag, attrs) {
    var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    if (attrs) Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    return e;
  }
  function ionSub(type, num) {
    var span = document.createElement("span");
    span.innerHTML = type + "<sub>" + num + "</sub>";
    return span;
  }

  /* ── 1. Info Panel ────────────────────────────────────── */
  (function renderInfo() {
    var panel = document.getElementById("info-panel");
    panel.appendChild(el("h2", null, "Identification"));
    var grid = el("div", { "class": "info-grid" });
    function add(label, value, cls) {
      var item = el("div", { "class": "info-item" });
      item.appendChild(el("span", { "class": "info-label" }, label));
      var v = el("span", { "class": "info-value" + (cls ? " " + cls : "") });
      if (typeof value === "string") { v.textContent = value; }
      else { v.appendChild(value); }
      item.appendChild(v);
      grid.appendChild(item);
    }

    // Score badge with color
    var scoreVal = D.score;
    var badgeCls = "score-badge " + (scoreVal > 0.5 ? "good" : scoreVal >= 0.2 ? "mid" : "low");
    var badge = el("span", { "class": badgeCls }, fmt(scoreVal, 3));
    var scoreWrap = document.createElement("span");
    scoreWrap.appendChild(badge);
    scoreWrap.appendChild(document.createTextNode("  (" + D.matched_ions + "/" + D.total_ions + " ions)"));

    add("Scan", String(D.scan_number));
    add("RT", fmt(D.retention_time_sec / 60, 2) + " min");
    add("Charge", D.charge + "+");
    add("Peptide", D.peptide_sequence, "peptide");
    add("Protein(s)", D.protein_accessions.join(", ") || "\u2014");
    add("Score", scoreWrap);
    add("Precursor m/z", fmt(D.precursor_mz, 4));
    add("\u0394 mass", fmt(D.delta_mass_ppm, 2) + " ppm");
    panel.appendChild(grid);
  })();

  /* ── 2. Peptide Coverage ──────────────────────────────── */
  (function renderCoverage() {
    var panel = document.getElementById("coverage-panel");
    panel.appendChild(el("h2", null, "Fragment Ion Coverage"));
    var wrap = el("div", { "class": "coverage-wrap" });
    var seq = D.peptide_sequence;
    var n = seq.length;

    // Build lookup: is b_i or y_i matched at cleavage position i (0-based, between residue i and i+1)
    var bMatched = [];
    var yMatched = [];
    for (var ci = 0; ci < n - 1; ci++) {
      var bIon = D.b_ions[ci];
      bMatched[ci] = !!(bIon && bIon.matched);
      var yIon = D.y_ions[n - 2 - ci];
      yMatched[ci] = !!(yIon && yIon.matched);
    }

    // b-ion row
    var bRow = el("div", { "class": "cov-row" });
    bRow.appendChild(el("div", { "class": "cov-cell" }));
    for (var i = 0; i < n - 1; i++) {
      var bI = D.b_ions[i];
      bRow.appendChild(el("div", { "class": "cov-cell spacer" }));
      var bCell = el("div", { "class": "cov-cell " + (bMatched[i] ? "matched-b" : "unmatched") });
      if (bI && bMatched[i]) {
        var bp = el("span", { "class": "cov-pill b-pill" }, "b" + bI.number);
        bCell.appendChild(bp);
      } else if (bI) {
        bCell.textContent = "b" + bI.number;
      }
      bRow.appendChild(bCell);
    }
    wrap.appendChild(bRow);

    // sequence row with cleavage coloring
    var sRow = el("div", { "class": "seq-row" });
    for (var j = 0; j < n; j++) {
      sRow.appendChild(el("div", { "class": "seq-cell" }, seq[j]));
      if (j < n - 1) {
        var sep = el("div", { "class": "seq-sep" });
        var clvCls = "cleavage";
        if (bMatched[j] && yMatched[j]) { clvCls += " both-matched"; }
        else if (bMatched[j]) { clvCls += " b-matched"; }
        else if (yMatched[j]) { clvCls += " y-matched"; }
        sep.appendChild(el("div", { "class": clvCls }));
        sRow.appendChild(sep);
      }
    }
    wrap.appendChild(sRow);

    // y-ion row
    var yRow = el("div", { "class": "cov-row" });
    yRow.appendChild(el("div", { "class": "cov-cell" }));
    for (var k = 0; k < n - 1; k++) {
      var yI = D.y_ions[n - 2 - k];
      yRow.appendChild(el("div", { "class": "cov-cell spacer" }));
      var yCell = el("div", { "class": "cov-cell " + (yMatched[k] ? "matched-y" : "unmatched") });
      if (yI && yMatched[k]) {
        var yp = el("span", { "class": "cov-pill y-pill" }, "y" + yI.number);
        yCell.appendChild(yp);
      } else if (yI) {
        yCell.textContent = "y" + yI.number;
      }
      yRow.appendChild(yCell);
    }
    wrap.appendChild(yRow);

    panel.appendChild(wrap);
  })();

  /* ── 3. Interactive Spectrum ──────────────────────────── */
  (function renderSpectrum() {
    var container = document.getElementById("spectrum-container");
    var tooltip = document.getElementById("tooltip");

    var W = 1200, H = 450;
    var margin = { top: 40, right: 30, bottom: 50, left: 60 };
    var pw = W - margin.left - margin.right;
    var ph = H - margin.top - margin.bottom;

    var peaks = D.peaks;
    if (!peaks.length) return;
    var maxMz = 0, maxInt = 0;
    for (var i = 0; i < peaks.length; i++) {
      if (peaks[i].mz > maxMz) maxMz = peaks[i].mz;
      if (peaks[i].intensity > maxInt) maxInt = peaks[i].intensity;
    }
    var mzMin = 0;
    var mzMax = maxMz * 1.05;
    var intMax = maxInt;

    function xScale(v) { return margin.left + (v - mzMin) / (mzMax - mzMin) * pw; }
    function yScale(v) { return margin.top + ph - (v / intMax) * ph; }

    var svg = svgEl("svg", {
      width: "100%", height: "auto",
      viewBox: "0 0 " + W + " " + H,
      preserveAspectRatio: "xMidYMid meet"
    });

    // axes group
    var gAxis = svgEl("g", { "class": "axis" });

    // x-axis
    gAxis.appendChild(svgEl("line", { x1: margin.left, y1: margin.top + ph, x2: margin.left + pw, y2: margin.top + ph, stroke: "#dee2e6" }));
    var xTicks = niceRange(mzMin, mzMax, 10);
    for (var xi = 0; xi < xTicks.length; xi++) {
      var tx = xScale(xTicks[xi]);
      gAxis.appendChild(svgEl("line", { x1: tx, y1: margin.top + ph, x2: tx, y2: margin.top + ph + 5, stroke: "#dee2e6" }));
      var tl = svgEl("text", { x: tx, y: margin.top + ph + 18, "text-anchor": "middle" });
      tl.textContent = xTicks[xi];
      gAxis.appendChild(tl);
    }
    var xLabel = svgEl("text", { x: margin.left + pw / 2, y: H - 6, "text-anchor": "middle", "class": "axis-label" });
    xLabel.textContent = "m/z";
    gAxis.appendChild(xLabel);

    // y-axis
    gAxis.appendChild(svgEl("line", { x1: margin.left, y1: margin.top, x2: margin.left, y2: margin.top + ph, stroke: "#dee2e6" }));
    var yTicks = [0, 25, 50, 75, 100];
    for (var yi = 0; yi < yTicks.length; yi++) {
      var pct = yTicks[yi];
      var ty = yScale(pct / 100 * intMax);
      gAxis.appendChild(svgEl("line", { x1: margin.left - 5, y1: ty, x2: margin.left, y2: ty, stroke: "#dee2e6" }));
      var yl = svgEl("text", { x: margin.left - 8, y: ty + 4, "text-anchor": "end" });
      yl.textContent = pct + "%";
      gAxis.appendChild(yl);
    }
    var yLabelEl = svgEl("text", { x: 14, y: margin.top + ph / 2, "text-anchor": "middle", "class": "axis-label", transform: "rotate(-90,14," + (margin.top + ph / 2) + ")" });
    yLabelEl.textContent = "Relative Intensity";
    gAxis.appendChild(yLabelEl);

    svg.appendChild(gAxis);

    // Collect annotated peak positions for overlap detection
    var labelPositions = [];
    var annotatedPeaks = [];
    for (var ap = 0; ap < peaks.length; ap++) {
      if (peaks[ap].annotation) {
        annotatedPeaks.push({ idx: ap, x: xScale(peaks[ap].mz), y: yScale(peaks[ap].intensity) });
      }
    }
    // Sort by x for overlap detection
    annotatedPeaks.sort(function (a, b) { return a.x - b.x; });

    // peaks
    var gPeaks = svgEl("g");
    for (var p = 0; p < peaks.length; p++) {
      var pk = peaks[p];
      var x = xScale(pk.mz);
      var y1 = yScale(0);
      var y2 = yScale(pk.intensity);
      var ann = pk.annotation;
      var cls, col;
      if (ann) {
        if (ann.ion_type === "B") { cls = "b-ion"; col = "#d63031"; }
        else { cls = "y-ion"; col = "#0984e3"; }
      } else {
        cls = "unmatched"; col = "#e0e0e0";
      }

      // peak line
      gPeaks.appendChild(svgEl("line", { x1: x, y1: y1, x2: x, y2: y2, "class": "peak-line " + cls }));

      // triangle marker and label for annotated peaks
      if (ann) {
        // Triangle marker (▼) at peak top
        var triSize = 3;
        var triPoints = (x - triSize) + "," + y2 + " " + (x + triSize) + "," + y2 + " " + x + "," + (y2 + triSize * 2);
        gPeaks.appendChild(svgEl("polygon", { points: triPoints, fill: col }));

        // Determine label offset — stagger to avoid overlap
        var labelText = (ann.ion_type === "B" ? "b" : "y") + ann.ion_number;
        var labelY = y2 - 6;
        // Check if too close to another label: alternate offset
        var stagger = false;
        for (var li = 0; li < labelPositions.length; li++) {
          if (Math.abs(labelPositions[li].x - x) < 30 && Math.abs(labelPositions[li].y - labelY) < 14) {
            stagger = true;
            break;
          }
        }
        if (stagger) { labelY = y2 - 18; }
        labelPositions.push({ x: x, y: labelY });

        // Horizontal label (no rotation)
        var lt = svgEl("text", { x: x, y: labelY, "text-anchor": "middle", fill: col, "class": "peak-label" });
        lt.textContent = labelText;
        gPeaks.appendChild(lt);
      }

      // invisible hitbox for tooltip
      (function (peak) {
        var hitbox = svgEl("line", { x1: x, y1: y1, x2: x, y2: y2, "class": "peak-hitbox" });
        hitbox.addEventListener("mouseenter", function () {
          var relInt = (peak.intensity / intMax * 100);
          var html = "<div class=\"tip-row\"><span class=\"tip-label\">m/z:</span><span class=\"tip-val\">" + fmt(peak.mz, 4) + "</span></div>";
          html += "<div class=\"tip-row\"><span class=\"tip-label\">Intensity:</span><span class=\"tip-val\">" + fmt(peak.intensity, 1) + " (" + fmt(relInt, 1) + "%)</span></div>";
          if (peak.annotation) {
            html += "<hr class=\"tip-sep\">";
            var a = peak.annotation;
            var ionLabel = (a.ion_type === "B" ? "b" : "y") + "<sub>" + a.ion_number + "</sub>";
            html += "<div class=\"tip-row\"><span class=\"tip-label\">Ion:</span><span class=\"tip-val\">" + ionLabel + "</span></div>";
            html += "<div class=\"tip-row\"><span class=\"tip-label\">\u0394 ppm:</span><span class=\"tip-val\">" + fmt(a.delta_ppm, 2) + "</span></div>";
          }
          tooltip.innerHTML = html;
          tooltip.style.display = "block";
        });
        hitbox.addEventListener("mousemove", function (ev) {
          tooltip.style.left = (ev.clientX + 14) + "px";
          tooltip.style.top = (ev.clientY - 28) + "px";
        });
        hitbox.addEventListener("mouseleave", function () {
          tooltip.style.display = "none";
        });
        gPeaks.appendChild(hitbox);
      })(pk);
    }
    svg.appendChild(gPeaks);
    container.appendChild(svg);
  })();

  /* nice tick generation */
  function niceRange(lo, hi, count) {
    var span = hi - lo;
    if (span <= 0) return [lo];
    var rough = span / count;
    var mag = Math.pow(10, Math.floor(Math.log10(rough)));
    var res = rough / mag;
    var step;
    if (res <= 1.5) step = mag;
    else if (res <= 3) step = 2 * mag;
    else if (res <= 7) step = 5 * mag;
    else step = 10 * mag;
    var start = Math.ceil(lo / step) * step;
    var ticks = [];
    for (var v = start; v <= hi; v += step) {
      ticks.push(Math.round(v * 1e6) / 1e6);
    }
    return ticks;
  }
})();
</script>
</body>
</html>
