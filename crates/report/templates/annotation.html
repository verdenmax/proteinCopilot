<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Annotation — ProteinCopilot</title>
<style>
  :root {
    --b-color: #d63031;
    --y-color: #0984e3;
    --unmatched-peak: #d0d0d0;
    --noise-peak: #f0f0f0;
    --unmatched-bracket: #e0e0e0;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #2c3e50;
    --text-muted: #7f8c8d;
    --border: #dee2e6;
    --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 20px; }

  /* ── Info Card ────────────────────────────────────────── */
  .info-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px; margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .info-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px 24px; }
  .info-item { display: flex; flex-direction: column; }
  .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); margin-bottom: 2px; }
  .info-value { font-size: 14px; font-weight: 500; }
  .info-value.peptide { font-family: 'Courier New', Courier, monospace; font-size: 16px; letter-spacing: 1px; font-weight: 700; }
  .score-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    color: #fff; font-weight: 700; font-size: 13px;
  }
  .score-badge.good { background: #27ae60; }
  .score-badge.mid  { background: #f39c12; }
  .score-badge.low  { background: #e74c3c; }

  /* ── Coverage & Spectrum Cards ─────────────────────────── */
  .coverage-card, .spectrum-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px; margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow-x: auto;
  }
  .coverage-card h2, .spectrum-card h2 {
    font-size: 16px; font-weight: 600; margin-bottom: 12px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px;
  }

  /* ── SVG shared ────────────────────────────────────────── */
  svg text { font-family: var(--font); }
  .axis text { font-size: 11px; fill: var(--text-muted); }
  .axis line, .axis path { stroke: var(--border); }
  .axis-label { font-size: 12px; fill: var(--text); font-weight: 500; }

  /* Coverage bracket highlight on hover */
  .cov-bracket.highlight { filter: brightness(1.3); stroke-width: 3.5 !important; }

  /* ── Tooltip ─────────────────────────────────────────── */
  #tooltip {
    position: fixed; pointer-events: none; display: none;
    background: rgba(44,62,80,.95); color: #fff; padding: 10px 14px;
    border-radius: 6px; font-size: 12px; font-family: 'Courier New', Courier, monospace;
    line-height: 1.6; white-space: nowrap; z-index: 1000;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  #tooltip::after {
    content: ''; position: absolute; top: 100%; left: 16px;
    border: 6px solid transparent; border-top-color: rgba(44,62,80,.95);
  }
  .tip-row { display: flex; justify-content: space-between; gap: 16px; }
  .tip-label { color: #95a5a6; font-size: 11px; }
  .tip-val { font-weight: 600; text-align: right; }
  .tip-sep { border: none; border-top: 1px solid rgba(255,255,255,.15); margin: 4px 0; }
</style>
</head>
<body>

<div id="info-panel" class="info-card"></div>
<div id="coverage-panel" class="coverage-card"></div>
<div class="spectrum-card">
  <h2>Spectrum</h2>
  <div id="spectrum-container"></div>
</div>
<div id="tooltip"></div>

<script>
/*__ANNOTATION_JSON__*/
</script>
<script>
(function () {
  "use strict";
  var D = window.__ANNOTATION_DATA__;
  if (!D) return;

  /* ── helpers ──────────────────────────────────────────── */
  function fmt(n, d) { return Number(n).toFixed(d === undefined ? 2 : d); }
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    if (typeof children === "string") e.textContent = children;
    else if (Array.isArray(children)) children.forEach(function (c) { if (c) e.appendChild(c); });
    return e;
  }
  function svgEl(tag, attrs) {
    var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    if (attrs) Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    return e;
  }
  var SUBSCRIPT_DIGITS = "\u2080\u2081\u2082\u2083\u2084\u2085\u2086\u2087\u2088\u2089";
  function subscript(n) {
    return String(n).split("").map(function (c) { return SUBSCRIPT_DIGITS[parseInt(c)]; }).join("");
  }

  /* ── 1. Info Panel ────────────────────────────────────── */
  (function renderInfo() {
    var panel = document.getElementById("info-panel");

    // Source file header
    if (D.source_file) {
      var fileHeader = el("div", { style: "font-size:13px;color:#7f8c8d;margin-bottom:6px;" }, "\uD83D\uDCC4 " + D.source_file);
      panel.appendChild(fileHeader);
    }

    panel.appendChild(el("h2", null, "Identification"));
    var grid = el("div", { "class": "info-grid" });
    function add(label, value, cls) {
      var item = el("div", { "class": "info-item" });
      item.appendChild(el("span", { "class": "info-label" }, label));
      var v = el("span", { "class": "info-value" + (cls ? " " + cls : "") });
      if (typeof value === "string") { v.textContent = value; }
      else { v.appendChild(value); }
      item.appendChild(v);
      grid.appendChild(item);
    }

    var scoreVal = D.score;
    var badgeCls = "score-badge " + (scoreVal > 0.5 ? "good" : scoreVal >= 0.2 ? "mid" : "low");
    var badge = el("span", { "class": badgeCls }, fmt(scoreVal, 3));
    var scoreWrap = document.createElement("span");
    scoreWrap.appendChild(badge);
    scoreWrap.appendChild(document.createTextNode("  (" + D.matched_ions + "/" + D.total_ions + " ions)"));

    add("Scan", String(D.scan_number));
    add("RT", fmt(D.retention_time_min, 2) + " min");
    add("Charge", D.charge + "+");
    add("Peptide", D.peptide_sequence, "peptide");
    add("Protein(s)", D.protein_accessions.join(", ") || "\u2014");
    add("Score", scoreWrap);
    add("Precursor m/z", fmt(D.precursor_mz, 4));
    add("\u0394 mass", fmt(D.delta_mass_ppm, 2) + " ppm");
    panel.appendChild(grid);
  })();

  /* ── 2. Fragment Ion Coverage (SVG bracket notation) ──── */
  (function renderCoverage() {
    var panel = document.getElementById("coverage-panel");
    panel.appendChild(el("h2", null, "Fragment Ion Coverage"));
    var seq = D.peptide_sequence;
    var n = seq.length;

    var cellW = 44;
    var totalW = n * cellW + 40;
    var seqY = 70;
    // y-bracket (above): C-term fragment, horizontal RIGHT over right residue
    var yHorizY = seqY - 20;
    var yVertTop = yHorizY;
    var yVertBot = seqY - 6;
    var yLabelY = yHorizY - 5;
    // b-bracket (below): N-term fragment, horizontal LEFT over left residue
    var bHorizY = seqY + 20;
    var bVertTop = seqY + 10;
    var bVertBot = bHorizY;
    var bLabelY = bHorizY + 16;
    var svgH = bLabelY + 10;
    var xOff = 20;

    var covSvg = svgEl("svg", {
      width: "100%", height: "auto",
      viewBox: "0 0 " + totalW + " " + svgH,
      preserveAspectRatio: "xMidYMid meet",
      style: "max-width:" + totalW + "px"
    });

    // Build match lookups (aggregate across charge states for multi-charge ions)
    var bMatched = [], yMatched = [];
    var bNumbers = [], yNumbers = [];
    for (var ci = 0; ci < n - 1; ci++) {
      var bNum = ci + 1;
      bNumbers[ci] = bNum;
      bMatched[ci] = false;
      for (var bi = 0; bi < D.b_ions.length; bi++) {
        if (D.b_ions[bi].number === bNum && D.b_ions[bi].matched) { bMatched[ci] = true; break; }
      }
      var yNum = n - 1 - ci;
      yNumbers[ci] = yNum;
      yMatched[ci] = false;
      for (var yi = 0; yi < D.y_ions.length; yi++) {
        if (D.y_ions[yi].number === yNum && D.y_ions[yi].matched) { yMatched[ci] = true; break; }
      }
    }

    // Amino acid letters
    for (var si = 0; si < n; si++) {
      var ax = xOff + si * cellW + cellW / 2;
      var aa = svgEl("text", {
        x: ax, y: seqY,
        "text-anchor": "middle",
        "dominant-baseline": "central",
        "font-size": "20",
        "font-family": "'Courier New', Courier, monospace",
        "font-weight": "700",
        fill: "#2c3e50"
      });
      aa.textContent = seq[si];
      covSvg.appendChild(aa);
    }

    // Draw brackets at each cleavage position
    for (var ci2 = 0; ci2 < n - 1; ci2++) {
      var cleavX = xOff + (ci2 + 1) * cellW;
      var rightCenterX = cleavX + cellW / 2;  // center of right residue
      var leftCenterX = cleavX - cellW / 2;   // center of left residue

      var bColor = bMatched[ci2] ? "#d63031" : "#e0e0e0";
      var bStroke = bMatched[ci2] ? 2.5 : 1.2;
      var yColor = yMatched[ci2] ? "#0984e3" : "#e0e0e0";
      var yStroke = yMatched[ci2] ? 2.5 : 1.2;

      // y-ion (ABOVE): C-term fragment — stub down + horizontal RIGHT
      covSvg.appendChild(svgEl("line", {
        x1: cleavX, y1: yVertTop, x2: cleavX, y2: yVertBot,
        stroke: yColor, "stroke-width": yStroke, "stroke-linecap": "round",
        "class": "cov-bracket", "data-ion": "y" + yNumbers[ci2]
      }));
      covSvg.appendChild(svgEl("line", {
        x1: cleavX, y1: yHorizY, x2: rightCenterX, y2: yHorizY,
        stroke: yColor, "stroke-width": yStroke, "stroke-linecap": "round",
        "class": "cov-bracket", "data-ion": "y" + yNumbers[ci2]
      }));
      var yLbl = svgEl("text", {
        x: cleavX + 2, y: yLabelY,
        "font-size": "10", "font-weight": "600",
        fill: yColor, "text-anchor": "start",
        "class": "cov-bracket", "data-ion": "y" + yNumbers[ci2]
      });
      yLbl.textContent = "y" + subscript(yNumbers[ci2]);
      covSvg.appendChild(yLbl);

      // b-ion (BELOW): N-term fragment — stub up + horizontal LEFT
      covSvg.appendChild(svgEl("line", {
        x1: cleavX, y1: bVertTop, x2: cleavX, y2: bVertBot,
        stroke: bColor, "stroke-width": bStroke, "stroke-linecap": "round",
        "class": "cov-bracket", "data-ion": "b" + bNumbers[ci2]
      }));
      covSvg.appendChild(svgEl("line", {
        x1: cleavX, y1: bHorizY, x2: leftCenterX, y2: bHorizY,
        stroke: bColor, "stroke-width": bStroke, "stroke-linecap": "round",
        "class": "cov-bracket", "data-ion": "b" + bNumbers[ci2]
      }));
      var bLbl = svgEl("text", {
        x: cleavX - 2, y: bLabelY,
        "font-size": "10", "font-weight": "600",
        fill: bColor, "text-anchor": "end",
        "class": "cov-bracket", "data-ion": "b" + bNumbers[ci2]
      });
      bLbl.textContent = "b" + subscript(bNumbers[ci2]);
      covSvg.appendChild(bLbl);
    }

    panel.appendChild(covSvg);
  })();

  /* ── 3. Interactive Spectrum ──────────────────────────── */
  (function renderSpectrum() {
    var container = document.getElementById("spectrum-container");
    var tooltip = document.getElementById("tooltip");

    var W = 1200, H = 500;
    var margin = { top: 40, right: 30, bottom: 55, left: 65 };
    var pw = W - margin.left - margin.right;
    var ph = H - margin.top - margin.bottom;

    var peaks = D.peaks;
    if (!peaks.length) return;
    var maxMz = 0, maxInt = 0;
    for (var i = 0; i < peaks.length; i++) {
      if (peaks[i].mz > maxMz) maxMz = peaks[i].mz;
      if (peaks[i].intensity > maxInt) maxInt = peaks[i].intensity;
    }
    var mzMin = 0;
    var mzMax = maxMz * 1.05;
    var intMax = maxInt;
    var minMatchedH = ph * 0.05;

    function xScale(v) { return margin.left + (v - mzMin) / (mzMax - mzMin) * pw; }
    function yScale(v) { return margin.top + ph - (v / intMax) * ph; }

    var svg = svgEl("svg", {
      width: "100%", height: "auto",
      viewBox: "0 0 " + W + " " + H,
      preserveAspectRatio: "xMidYMid meet"
    });

    // Background
    svg.appendChild(svgEl("rect", {
      x: margin.left, y: margin.top, width: pw, height: ph,
      fill: "#f8f9fa"
    }));

    // Horizontal grid lines at 25%, 50%, 75%, 100%
    var gGrid = svgEl("g");
    var gridPcts = [25, 50, 75, 100];
    for (var gi = 0; gi < gridPcts.length; gi++) {
      var gy = yScale(gridPcts[gi] / 100 * intMax);
      gGrid.appendChild(svgEl("line", {
        x1: margin.left, y1: gy, x2: margin.left + pw, y2: gy,
        stroke: "#e8e8e8", "stroke-width": "0.5", "stroke-dasharray": "4,3"
      }));
    }
    svg.appendChild(gGrid);

    // Axes
    var gAxis = svgEl("g", { "class": "axis" });

    // x-axis
    gAxis.appendChild(svgEl("line", {
      x1: margin.left, y1: margin.top + ph,
      x2: margin.left + pw, y2: margin.top + ph, stroke: "#dee2e6"
    }));
    var xTicks = niceRange(mzMin, mzMax, 10);
    for (var xi = 0; xi < xTicks.length; xi++) {
      var tx = xScale(xTicks[xi]);
      gAxis.appendChild(svgEl("line", {
        x1: tx, y1: margin.top + ph, x2: tx, y2: margin.top + ph + 5, stroke: "#dee2e6"
      }));
      var tl = svgEl("text", { x: tx, y: margin.top + ph + 18, "text-anchor": "middle" });
      tl.textContent = xTicks[xi];
      gAxis.appendChild(tl);
    }
    var xLabel = svgEl("text", {
      x: margin.left + pw / 2, y: H - 6,
      "text-anchor": "middle", "class": "axis-label"
    });
    xLabel.textContent = "m/z";
    gAxis.appendChild(xLabel);

    // y-axis
    gAxis.appendChild(svgEl("line", {
      x1: margin.left, y1: margin.top,
      x2: margin.left, y2: margin.top + ph, stroke: "#dee2e6"
    }));
    var yTicks = [0, 25, 50, 75, 100];
    for (var yi = 0; yi < yTicks.length; yi++) {
      var pct = yTicks[yi];
      var ty = yScale(pct / 100 * intMax);
      gAxis.appendChild(svgEl("line", {
        x1: margin.left - 5, y1: ty, x2: margin.left, y2: ty, stroke: "#dee2e6"
      }));
      var yl = svgEl("text", { x: margin.left - 8, y: ty + 4, "text-anchor": "end" });
      yl.textContent = pct + "%";
      gAxis.appendChild(yl);
    }
    var yLabelEl = svgEl("text", {
      x: 16, y: margin.top + ph / 2,
      "text-anchor": "middle", "class": "axis-label",
      transform: "rotate(-90,16," + (margin.top + ph / 2) + ")"
    });
    yLabelEl.textContent = "Relative Intensity";
    gAxis.appendChild(yLabelEl);
    svg.appendChild(gAxis);

    // Separate peaks into layers: noise → unmatched → matched (draw order)
    var baseline = margin.top + ph;
    var gNoise = svgEl("g");
    var gUnmatched = svgEl("g");
    var gMatched = svgEl("g");
    var gLabels = svgEl("g");
    var gHitboxes = svgEl("g");

    // Collect label positions for overlap staggering
    var labelPositions = [];

    for (var p = 0; p < peaks.length; p++) {
      var pk = peaks[p];
      var relInt = pk.intensity / intMax;
      var x = xScale(pk.mz);
      var ann = pk.annotation;

      if (ann) {
        // Matched peak: 3px stroke, vivid color, minimum height enforced
        var peakH = relInt * ph;
        if (peakH < minMatchedH) peakH = minMatchedH;
        var y2m = baseline - peakH;
        var col = ann.ion_type === "B" ? "#d63031" : "#0984e3";

        gMatched.appendChild(svgEl("line", {
          x1: x, y1: baseline, x2: x, y2: y2m,
          stroke: col, "stroke-width": "3", "stroke-linecap": "round"
        }));

        // Label with subscript digits
        var ionPrefix = ann.ion_type === "B" ? "b" : "y";
        var labelText = ionPrefix + subscript(ann.ion_number);
        var labelY = y2m - 6;

        // Stagger to avoid overlap
        for (var li = 0; li < labelPositions.length; li++) {
          if (Math.abs(labelPositions[li].x - x) < 20) {
            var diff = Math.abs(labelPositions[li].y - labelY);
            if (diff < 16) {
              labelY = labelPositions[li].y - 18;
            }
          }
        }
        if (labelY < margin.top + 4) labelY = margin.top + 4;
        labelPositions.push({ x: x, y: labelY });

        var lt = svgEl("text", {
          x: x, y: labelY, "text-anchor": "middle",
          fill: col, "font-size": "14", "font-weight": "700"
        });
        lt.textContent = labelText;
        gLabels.appendChild(lt);

      } else if (relInt < 0.05) {
        // Noise peak: very thin, very light
        var y2n = yScale(pk.intensity);
        gNoise.appendChild(svgEl("line", {
          x1: x, y1: baseline, x2: x, y2: y2n,
          stroke: "#f0f0f0", "stroke-width": "0.5"
        }));
      } else {
        // Unmatched peak above 5%: thin, light gray
        var y2u = yScale(pk.intensity);
        gUnmatched.appendChild(svgEl("line", {
          x1: x, y1: baseline, x2: x, y2: y2u,
          stroke: "#d0d0d0", "stroke-width": "1"
        }));
      }

      // Hitbox for all peaks (wider for easier hovering)
      (function (peak, px, ann2) {
        var peakTop = ann2
          ? baseline - Math.max((peak.intensity / intMax) * ph, minMatchedH)
          : yScale(peak.intensity);
        var hitbox = svgEl("line", {
          x1: px, y1: baseline, x2: px, y2: peakTop,
          stroke: "transparent", "stroke-width": "12", fill: "none",
          cursor: "pointer"
        });

        var ionId = ann2 ? ((ann2.ion_type === "B" ? "b" : "y") + ann2.ion_number) : null;

        hitbox.addEventListener("mouseenter", function () {
          var relI = (peak.intensity / intMax * 100);
          var html = "<div class=\"tip-row\"><span class=\"tip-label\">m/z</span><span class=\"tip-val\">" + fmt(peak.mz, 4) + "</span></div>";
          html += "<div class=\"tip-row\"><span class=\"tip-label\">Intensity</span><span class=\"tip-val\">" + fmt(peak.intensity, 1) + " (" + fmt(relI, 1) + "%)</span></div>";
          if (ann2) {
            html += "<hr class=\"tip-sep\">";
            var lbl = (ann2.ion_type === "B" ? "b" : "y") + "<sub>" + ann2.ion_number + "</sub>";
            html += "<div class=\"tip-row\"><span class=\"tip-label\">Ion</span><span class=\"tip-val\">" + lbl + "</span></div>";
            html += "<div class=\"tip-row\"><span class=\"tip-label\">\u0394 ppm</span><span class=\"tip-val\">" + fmt(ann2.delta_ppm, 2) + "</span></div>";
          }
          tooltip.innerHTML = html;
          tooltip.style.display = "block";

          // Highlight corresponding bracket in coverage diagram
          if (ionId) {
            var brackets = document.querySelectorAll(".cov-bracket[data-ion='" + ionId + "']");
            for (var bi = 0; bi < brackets.length; bi++) {
              brackets[bi].classList.add("highlight");
            }
          }
        });
        hitbox.addEventListener("mousemove", function (ev) {
          tooltip.style.left = (ev.clientX + 14) + "px";
          tooltip.style.top = (ev.clientY - 28) + "px";
        });
        hitbox.addEventListener("mouseleave", function () {
          tooltip.style.display = "none";
          if (ionId) {
            var brackets = document.querySelectorAll(".cov-bracket[data-ion='" + ionId + "']");
            for (var bi2 = 0; bi2 < brackets.length; bi2++) {
              brackets[bi2].classList.remove("highlight");
            }
          }
        });
        gHitboxes.appendChild(hitbox);
      })(pk, x, ann);
    }

    svg.appendChild(gNoise);
    svg.appendChild(gUnmatched);
    svg.appendChild(gMatched);
    svg.appendChild(gLabels);
    svg.appendChild(gHitboxes);
    container.appendChild(svg);
  })();

  /* nice tick generation */
  function niceRange(lo, hi, count) {
    var span = hi - lo;
    if (span <= 0) return [lo];
    var rough = span / count;
    var mag = Math.pow(10, Math.floor(Math.log10(rough)));
    var res = rough / mag;
    var step;
    if (res <= 1.5) step = mag;
    else if (res <= 3) step = 2 * mag;
    else if (res <= 7) step = 5 * mag;
    else step = 10 * mag;
    var start = Math.ceil(lo / step) * step;
    var ticks = [];
    for (var v = start; v <= hi; v += step) {
      ticks.push(Math.round(v * 1e6) / 1e6);
    }
    return ticks;
  }
})();
</script>
</body>
</html>
