name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release -p protein-copilot-mcp-server --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          dist="protein-copilot-mcp-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/protein-copilot-mcp" "$dist/"
          cp README.md LICENSE docs/mcp-tools.md "$dist/" 2>/dev/null || true
          tar czf "$dist.tar.gz" "$dist"
          echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          dist="protein-copilot-mcp-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/protein-copilot-mcp.exe" "$dist/"
          cp README.md LICENSE docs/mcp-tools.md "$dist/" 2>/dev/null || true
          7z a "$dist.zip" "$dist"
          echo "ASSET=$dist.zip" >> "$GITHUB_ENV"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
